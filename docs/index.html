<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funky Clothing Hub - Find Your Style</title>
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --primary-pastel: #FFB3D9;
    --secondary-pastel: #FFD6E8;
    --tertiary-pastel: #B3E5FC;
    --accent-pastel: #C8E6C9;
    --light-bg: #FFF9FC;
    --dark-text: #2d2d2d;
    --glow-color: #FFB3D9;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #FFF9FC 0%, #F0E6FF 100%);
    color: var(--dark-text);
    overflow-x: hidden;
    min-height: 100vh;
}

/* ========== LANDING PAGE ========== */
.landing-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, #FFF9FC 0%, #FFE6F0 50%, #F0E6FF 100%);
}

.animated-background {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: 
        radial-gradient(circle at 20% 50%, rgba(255, 179, 217, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(200, 230, 201, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 40% 20%, rgba(184, 229, 255, 0.3) 0%, transparent 50%);
    animation: backgroundShift 15s ease-in-out infinite;
}

@keyframes backgroundShift {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(30px, 30px); }
}

.landing-content {
    position: relative;
    z-index: 2;
    text-align: center;
    animation: fadeInUp 1s ease-out;
}

.logo-container {
    margin-bottom: 60px;
}

.main-title {
    font-size: 4rem;
    font-weight: 900;
    background: linear-gradient(135deg, #FF6B9D, #FFB3D9, #FF6B9D);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 20px;
    animation: bounce 2s infinite;
    letter-spacing: 2px;
}

.subtitle {
    font-size: 1.5rem;
    color: #FF6B9D;
    font-weight: 500;
    animation: fadeInUp 1.2s ease-out;
}

.floating-shapes {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
}

.shape {
    position: absolute;
    border-radius: 50%;
    opacity: 0.6;
}

.shape-1 {
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, #FFB3D9, #FFD6E8);
    top: 10%;
    left: 10%;
    animation: float 6s ease-in-out infinite;
}

.shape-2 {
    width: 150px;
    height: 150px;
    background: radial-gradient(circle, #B3E5FC, #C8E6C9);
    bottom: 20%;
    right: 10%;
    animation: float 8s ease-in-out infinite reverse;
}

.shape-3 {
    width: 100px;
    height: 100px;
    background: radial-gradient(circle, #C8E6C9, #FFD6E8);
    top: 50%;
    right: 20%;
    animation: float 7s ease-in-out infinite;
}

@keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(30px); }
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(40px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.start-button {
    position: relative;
    padding: 18px 50px;
    font-size: 1.2rem;
    font-weight: 700;
    color: white;
    background: linear-gradient(135deg, #FF6B9D, #FFB3D9);
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(255, 107, 157, 0.4);
    transition: all 0.3s ease;
    overflow: hidden;
    margin: 30px 0;
    animation: slideInUp 1s ease-out;
}

.button-glow {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    background: rgba(255, 255, 255, 0.3);
    border-radius: 50px;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255, 107, 157, 0.7); }
    50% { box-shadow: 0 0 0 10px rgba(255, 107, 157, 0); }
}

.start-button:hover {
    transform: translateY(-5px);
    box-shadow: 0 15px 40px rgba(255, 107, 157, 0.6);
}

.start-button:active {
    transform: translateY(-2px);
}

@keyframes slideInUp {
    from {
        opacity: 0;
        transform: translateY(60px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.cta-text {
    font-size: 1.1rem;
    color: #FF6B9D;
    margin-top: 20px;
    animation: fadeInUp 1.4s ease-out;
}

/* ========== QUIZ PAGE ========== */
.quiz-container {
    min-height: 100vh;
    padding: 40px 20px;
    background: linear-gradient(135deg, #FFF9FC 0%, #FFE6F0 50%, #F0E6FF 100%);
    position: relative;
}

.quiz-background {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: 
        radial-gradient(circle at 20% 50%, rgba(255, 179, 217, 0.2) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(200, 230, 201, 0.2) 0%, transparent 50%);
    pointer-events: none;
}

.quiz-content {
    max-width: 900px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
}

.back-button {
    background: linear-gradient(135deg, #FFB3D9, #FFD6E8);
    border: none;
    padding: 12px 25px;
    border-radius: 25px;
    cursor: pointer;
    font-weight: 600;
    color: var(--dark-text);
    margin-bottom: 30px;
    transition: all 0.3s ease;
    box-shadow: 0 5px 15px rgba(255, 179, 217, 0.3);
}

.back-button:hover {
    transform: translateX(-5px);
    box-shadow: 0 8px 20px rgba(255, 179, 217, 0.4);
}

.quiz-header {
    text-align: center;
    margin-bottom: 50px;
    animation: fadeInDown 0.8s ease-out;
}

.quiz-header h2 {
    font-size: 2.5rem;
    color: #FF6B9D;
    margin-bottom: 10px;
}

.quiz-header p {
    font-size: 1.2rem;
    color: #B39DDB;
}

.preferences-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 40px;
    margin-bottom: 40px;
}

.preference-section {
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(255, 179, 217, 0.2);
    animation: slideInUp 0.8s ease-out;
}

.preference-section h3 {
    font-size: 1.3rem;
    color: #FF6B9D;
    margin-bottom: 20px;
    text-align: center;
}

.preference-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.pref-btn {
    padding: 20px 15px;
    border: 3px solid transparent;
    border-radius: 15px;
    background: linear-gradient(135deg, #FFE6F0, #F0E6FF);
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    font-weight: 600;
    color: var(--dark-text);
    font-size: 0.9rem;
}

.pref-btn .emoji {
    font-size: 1.8rem;
}

.pref-btn:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 25px rgba(255, 179, 217, 0.3);
    border-color: #FFB3D9;
}

.pref-btn.selected {
    background: linear-gradient(135deg, #FFB3D9, #FFD6E8);
    border-color: #FF6B9D;
    box-shadow: 0 10px 30px rgba(255, 107, 157, 0.4);
    transform: scale(1.05);
}

.show-products-button {
    width: 100%;
    padding: 18px 30px;
    font-size: 1.1rem;
    font-weight: 700;
    color: white;
    background: linear-gradient(135deg, #FF6B9D, #FFB3D9);
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(255, 107, 157, 0.4);
    transition: all 0.3s ease;
    margin-top: 30px;
}

.show-products-button:hover:not(:disabled) {
    transform: translateY(-3px);
    box-shadow: 0 15px 40px rgba(255, 107, 157, 0.6);
}

.show-products-button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

/* ========== PRODUCTS PAGE ========== */
.products-container {
    min-height: 100vh;
    padding: 40px 20px;
    background: linear-gradient(135deg, #FFF9FC 0%, #FFE6F0 50%, #F0E6FF 100%);
}

.products-header {
    max-width: 1200px;
    margin: 0 auto 50px;
    text-align: center;
    position: relative;
}

.products-header h2 {
    font-size: 2.5rem;
    color: #FF6B9D;
    margin-bottom: 10px;
}

.match-message {
    font-size: 1.1rem;
    color: #B39DDB;
    margin-top: 10px;
}

.products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 30px;
    max-width: 1200px;
    margin: 0 auto;
}

.product-card {
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(255, 179, 217, 0.2);
    transition: all 0.3s ease;
    cursor: pointer;
    animation: fadeInUp 0.6s ease-out;
}

.product-card:hover {
    transform: translateY(-10px);
    box-shadow: 0 20px 40px rgba(255, 179, 217, 0.3);
}

.product-image {
    width: 100%;
    height: 250px;
    background: linear-gradient(135deg, #FFE6F0, #F0E6FF);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 4rem;
    overflow: hidden;
    position: relative;
}

.product-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.product-info {
    padding: 20px;
}

.product-name {
    font-size: 1.2rem;
    font-weight: 700;
    color: #FF6B9D;
    margin-bottom: 8px;
}

.product-description {
    font-size: 0.9rem;
    color: #777;
    margin-bottom: 12px;
    line-height: 1.4;
}

.product-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 15px;
    padding-top: 15px;
    border-top: 1px solid #f0f0f0;
}

.product-price {
    font-weight: 700;
    color: #FF6B9D;
    font-size: 1.1rem;
}

.product-tags {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    margin-top: 10px;
}

.tag {
    font-size: 0.75rem;
    padding: 5px 10px;
    background: linear-gradient(135deg, #FFE6F0, #F0E6FF);
    border-radius: 15px;
    color: #FF6B9D;
    font-weight: 600;
}

/* ========== MODAL ========== */
.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 20px;
    animation: fadeIn 0.3s ease-out;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

.modal-content {
    background: white;
    border-radius: 20px;
    max-width: 600px;
    width: 100%;
    position: relative;
    animation: slideUp 0.3s ease-out;
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(50px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.modal-close {
    position: absolute;
    top: 20px;
    right: 20px;
    background: none;
    border: none;
    font-size: 2rem;
    cursor: pointer;
    color: #FF6B9D;
    z-index: 10;
    transition: 0.3s ease;
}

.modal-close:hover {
    transform: scale(1.2);
}

.modal-body {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 30px;
    padding: 40px;
}

.modal-image {
    width: 100%;
}

.modal-image img {
    width: 100%;
    border-radius: 15px;
    background: linear-gradient(135deg, #FFE6F0, #F0E6FF);
}

.modal-details h2 {
    color: #FF6B9D;
    margin-bottom: 15px;
    font-size: 1.8rem;
}

.modal-description {
    color: #666;
    line-height: 1.6;
    margin-bottom: 20px;
}

.modal-info {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
}

.price {
    font-weight: 700;
    color: #FF6B9D;
    font-size: 1.3rem;
}

.size {
    color: #999;
    font-weight: 600;
}

.tags {
    display: flex;
    gap: 8px;
    margin: 20px 0;
    flex-wrap: wrap;
}

.add-to-cart-btn {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #FF6B9D, #FFB3D9);
    color: white;
    border: none;
    border-radius: 10px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.3s ease;
    margin-top: 15px;
}

.add-to-cart-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 25px rgba(255, 107, 157, 0.3);
}

@media (max-width: 768px) {
    .main-title {
        font-size: 2.5rem;
    }
    
    .subtitle {
        font-size: 1.2rem;
    }
    
    .preferences-grid {
        grid-template-columns: 1fr;
    }
    
    .products-grid {
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 20px;
    }
    
    .modal-body {
        grid-template-columns: 1fr;
        padding: 20px;
    }
    
    .quiz-header h2 {
        font-size: 1.8rem;
    }
    
    .preference-buttons {
        grid-template-columns: 1fr;
    }
}

@media (max-width: 480px) {
    .main-title {
        font-size: 2rem;
    }
    
    .logo-container {
        margin-bottom: 40px;
    }
    
    .start-button {
        padding: 15px 30px;
        font-size: 1rem;
    }
    
    .products-grid {
        grid-template-columns: 1fr;
    }
}
    </style>

let userPreferences = {
    style: null,
    color: null,
    vibe: null
};

const landingPage = document.getElementById('landing');
const quizContainer = document.getElementById('quiz');
const productsContainer = document.getElementById('products');
const startBtn = document.getElementById('startBtn');
const backBtn = document.getElementById('backBtn');
const backToQuizBtn = document.getElementById('backToQuizBtn');
const showProductsBtn = document.getElementById('showProductsBtn');
const productModal = document.getElementById('productModal');
const modalClose = document.querySelector('.modal-close');
const preferenceBtns = document.querySelectorAll('.pref-btn');

startBtn.addEventListener('click', goToQuiz);
backBtn.addEventListener('click', goToLanding);
backToQuizBtn.addEventListener('click', goToQuiz);
showProductsBtn.addEventListener('click', goToProducts);
modalClose.addEventListener('click', closeModal);

preferenceBtns.forEach(btn => {
    btn.addEventListener('click', selectPreference);
});

productModal.addEventListener('click', (e) => {
    if (e.target === productModal) {
        closeModal();
    }
});

function goToLanding() {
    landingPage.style.display = 'flex';
    quizContainer.style.display = 'none';
    productsContainer.style.display = 'none';
    resetPreferences();
}

function goToQuiz() {
    landingPage.style.display = 'none';
    quizContainer.style.display = 'block';
    productsContainer.style.display = 'none';
}

function goToProducts() {
    landingPage.style.display = 'none';
    quizContainer.style.display = 'none';
    productsContainer.style.display = 'block';
    displayProducts();
}

function selectPreference(e) {
    const btn = e.currentTarget;
    const type = btn.dataset.type;
    const value = btn.dataset.value;
    
    document.querySelectorAll(`[data-type="${type}"]`).forEach(b => {
        b.classList.remove('selected');
    });
    
    btn.classList.add('selected');
    userPreferences[type] = value;
    checkAllPreferencesSelected();
}

function checkAllPreferencesSelected() {
    const allSelected = Object.values(userPreferences).every(val => val !== null);
    showProductsBtn.disabled = !allSelected;
}

function resetPreferences() {
    userPreferences = {
        style: null,
        color: null,
        vibe: null
    };
    preferenceBtns.forEach(btn => btn.classList.remove('selected'));
    showProductsBtn.disabled = true;
}

function getRecommendations(preferences) {
    let results = clothingProducts.filter(product => {
        const styleMatch = !preferences.style || product.style === preferences.style;
        const colorMatch = !preferences.color || product.color === preferences.color;
        const vibeMatch = !preferences.vibe || product.vibe === preferences.vibe;
        return styleMatch && colorMatch && vibeMatch;
    });
    
    if (results.length === 0) {
        results = clothingProducts.filter(product => {
            let matches = 0;
            if (preferences.style && product.style === preferences.style) matches++;
            if (preferences.color && product.color === preferences.color) matches++;
            if (preferences.vibe && product.vibe === preferences.vibe) matches++;
            return matches >= 2;
        });
    }
    
    if (results.length === 0) {
        results = clothingProducts;
    }
    
    return results;
}

function displayProducts() {
    const recommendations = getRecommendations(userPreferences);
    const productsGrid = document.getElementById('productsGrid');
    const matchMessage = document.getElementById('matchMessage');
    
    const styleLabel = userPreferences.style.charAt(0).toUpperCase() + userPreferences.style.slice(1);
    const colorLabel = userPreferences.color.charAt(0).toUpperCase() + userPreferences.color.slice(1);
    const vibeLabel = userPreferences.vibe.charAt(0).toUpperCase() + userPreferences.vibe.slice(1);
    matchMessage.textContent = `${styleLabel} • ${colorLabel} • ${vibeLabel} — ${recommendations.length} perfect matches found! ✨`;
    
    productsGrid.innerHTML = '';
    
    recommendations.forEach((product, index) => {
        const card = createProductCard(product);
        card.style.animationDelay = `${index * 0.1}s`;
        productsGrid.appendChild(card);
    });
}

function createProductCard(product) {
    const card = document.createElement('div');
    card.className = 'product-card';
    card.style.animation = 'fadeInUp 0.6s ease-out forwards';
    
    const tagsHTML = product.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
    
    card.innerHTML = `
        <div class="product-image">
            ${product.emoji}
        </div>
        <div class="product-info">
            <div class="product-name">${product.name}</div>
            <div class="product-description">${product.description}</div>
            <div class="product-tags">
                ${tagsHTML}
            </div>
            <div class="product-footer">
                <span class="product-price">${product.price}</span>
            </div>
        </div>
    `;
    
    card.addEventListener('click', () => openModal(product));
    return card;
}

function openModal(product) {
    const tagsHTML = product.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
    
    document.getElementById('modalImage').textContent = product.emoji;
    document.getElementById('modalImage').style.fontSize = '8rem';
    document.getElementById('modalImage').style.display = 'flex';
    document.getElementById('modalImage').style.alignItems = 'center';
    document.getElementById('modalImage').style.justifyContent = 'center';
    document.getElementById('modalImage').style.background = 'linear-gradient(135deg, #FFE6F0, #F0E6FF)';
    document.getElementById('modalImage').style.borderRadius = '15px';
    
    document.getElementById('modalTitle').textContent = product.name;
    document.getElementById('modalDescription').textContent = product.description;
    document.getElementById('modalPrice').textContent = product.price;
    document.getElementById('modalSize').textContent = product.size;
    document.getElementById('modalTags').innerHTML = tagsHTML;
    
    productModal.style.display = 'flex';
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    productModal.style.display = 'none';
    document.body.style.overflow = 'auto';
}

document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        closeModal();
    }
});
